# ============================================
# Server
# ============================================
server.port=8080

# ============================================
# MySQL Database
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/devlancr?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT
# ============================================
app.jwt.secret=DevLancrSecretKeyForJWTTokenGeneration2024MustBeAtLeast256BitsLong!!
app.jwt.expiration=86400000

# ============================================
# Platform Settings
# ============================================
app.platform.fee-percentage=10

# ============================================
# File Upload (future)
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
